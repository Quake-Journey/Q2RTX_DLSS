echo Ultra-mega-quality graphics test config loaded
echo This profile maximizes practical Q2RTX quality and does NOT change DLSS or RR settings
echo Notes: HDR off, DOF off, accumulation off; switch DLSS/RR yourself from the menu
echo Surface lights default to 1 because mode 2 reintroduced RR reflection speckles

alias umq_apply "vid_rtx 1; vid_hdr 0; vid_vsync 0; r_maxfps 0; scr_fps 2; r_debug_pre_dlss_color 0; r_debug_post_dlss_color 0; r_debug_post_tonemap_color 0; bloom_enable 1; flt_enable 1; gr_enable 1; pt_enable_surface_lights 1; pt_direct_polygon_lights 1; pt_indirect_polygon_lights 1; pt_direct_dyn_lights 1; pt_indirect_dyn_lights 1; pt_direct_sun_light 1; pt_bsp_sky_lights 0; pt_cameras 1; pt_caustics 1; pt_num_bounce_rays 2; pt_reflect_refract 8; pt_thick_glass 2; pt_projection 0; pt_waterwarp 0; pt_nearest 0; pt_specular_mis 1; pt_specular_anti_flicker 2; pt_sun_bounce_range 2000; pt_fake_roughness_threshold 0.20; pt_ndf_trim 0.9; pt_toksvig 1; pt_texture_lod_bias -2; pt_roughness_override -1; pt_metallic_override -1; pt_bump_scale 1; pt_accumulation_rendering 0; pt_accumulation_rendering_framenum 500; pt_dof 0; pt_freecam 0; echo umq_apply done"
alias umq_overlay_on "r_debug_dlss_overlay 1; echo DLSS overlay ON"
alias umq_overlay_off "r_debug_dlss_overlay 0; echo DLSS overlay OFF"
alias umq_surflights_stable "pt_enable_surface_lights 1; echo pt_enable_surface_lights 1"
alias umq_surflights_extreme "pt_enable_surface_lights 2; echo pt_enable_surface_lights 2"
alias umq_roughness_true "pt_roughness_override -1; echo pt_roughness_override -1"
alias umq_roughness_smooth "pt_roughness_override 0.5; echo pt_roughness_override 0.5"
alias umq_restart "vid_restart"
alias umq_dump "condump ultra_mega_quality"

echo Use: exec q2rtx_ultra_mega_quality.cfg
echo Then: umq_apply
echo Then switch DLSS and RR manually in the menu
echo Optional: umq_overlay_on / umq_overlay_off
echo Optional: umq_surflights_stable / umq_surflights_extreme
echo Optional: umq_roughness_true / umq_roughness_smooth
echo Use umq_restart after big mode switches for a clean comparison
