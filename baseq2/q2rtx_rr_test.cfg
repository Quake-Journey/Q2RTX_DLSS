echo RR test config loaded
alias rr_base "flt_dlss_enable 1; flt_dlss_rr 1; flt_dlss_mfg 0; r_dlss_taa_input_profile 2; flt_dlss_rr_specular_stabilizers 2; echo rr_base"
alias rr_rr0 "flt_dlss_rr 0; echo flt_dlss_rr 0"
alias rr_rr1 "flt_dlss_rr 1; echo flt_dlss_rr 1"
alias rr_refl1 "pt_reflect_refract 1; echo pt_reflect_refract 1"
alias rr_refl2 "pt_reflect_refract 2; echo pt_reflect_refract 2"
alias rr_refl4 "pt_reflect_refract 4; echo pt_reflect_refract 4"
alias rr_refl8 "pt_reflect_refract 8; echo pt_reflect_refract 8"
alias rr_glass0 "pt_thick_glass 0; echo pt_thick_glass 0"
alias rr_glass2 "pt_thick_glass 2; echo pt_thick_glass 2"
alias rr_caustics0 "pt_caustics 0; echo pt_caustics 0"
alias rr_caustics1 "pt_caustics 1; echo pt_caustics 1"
alias rr_bounce05 "pt_num_bounce_rays 0.5; echo pt_num_bounce_rays 0.5"
alias rr_bounce1 "pt_num_bounce_rays 1; echo pt_num_bounce_rays 1"
alias rr_bounce2 "pt_num_bounce_rays 2; echo pt_num_bounce_rays 2"
alias rr_mis0 "pt_specular_mis 0; echo pt_specular_mis 0"
alias rr_mis1 "pt_specular_mis 1; echo pt_specular_mis 1"
alias rr_rrstab0 "flt_dlss_rr_specular_stabilizers 0; echo flt_dlss_rr_specular_stabilizers 0"
alias rr_rrstab1 "flt_dlss_rr_specular_stabilizers 1; echo flt_dlss_rr_specular_stabilizers 1"
alias rr_rrstab2 "flt_dlss_rr_specular_stabilizers 2; echo flt_dlss_rr_specular_stabilizers 2"
alias rr_dump "condump rr_test"
echo NOTE flt_enable is ignored while RR is active
echo NOTE rr_rrstab0 keeps old raw RR behavior
echo NOTE rr_rrstab1 restores anti-flicker plus sun bounce range under RR
echo NOTE rr_rrstab2 also restores fake roughness threshold and NDF trim under RR
echo NOTE these tests are the useful ones for mirror noise
echo Use: rr_base, then rr_rrstab0/1/2 and rr_refl1/2/4/8 rr_glass0/2 rr_caustics0/1 rr_bounce05/1/2 rr_mis0/1
